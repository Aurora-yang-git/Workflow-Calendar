name: Flomo Daily Diary Header

# Fires at 00:00 UTC = 08:00 CST every day.
# China has no DST, so this mapping is stable year-round.
# Creates a "#Diary Jun. 16 时间记录" header memo in flomo.
# Aurora writes her time records into this memo throughout the day.
# Stores the memo ID as a Repository Variable for the logger workflow to use.
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  # Required to write DIARY_MEMO_ID_TODAY and DIARY_MEMO_LAST_UPDATED variables.
  actions: write

jobs:
  create-diary-header:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Create diary header memo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Compute date in CST (Asia/Shanghai, UTC+8). Must use TZ env so
          # the date command reflects CST, not the runner's UTC clock.
          export TZ="Asia/Shanghai"
          DATE=$(date "+%b. %-d")   # e.g. "Jun. 16"  (GNU date, %-d strips zero-pad)
          CONTENT="#Diary ${DATE} 时间记录"

          echo "Creating memo: ${CONTENT}"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "https://flomoapp.com/api/v1/memo/" \
            -H "Authorization: Bearer ${{ secrets.FLOMO_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"${CONTENT}\"}" \
            --max-time 30)

          HTTP_STATUS=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP status: $HTTP_STATUS"
          echo "Response body: $BODY"

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::flomo API returned HTTP $HTTP_STATUS"
            exit 1
          fi

          # Check flomo application-level status (code=0 means success).
          APP_CODE=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('code','missing'))" 2>/dev/null || echo "parse_error")
          if [ "$APP_CODE" != "0" ]; then
            echo "::error::flomo API error (code=$APP_CODE): $BODY"
            exit 1
          fi

          echo "✅ Diary header created: ${CONTENT}"

          # Extract the memo ID from the response so the logger workflow can
          # pass it directly to the Routine (memo_batch_get instead of memo_search).
          MEMO_ID=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('id',''))" 2>/dev/null || echo "")
          if [ -z "$MEMO_ID" ]; then
            echo "::warning::Could not extract memo ID from response — logger will fall back to memo_search"
          else
            echo "Memo ID: $MEMO_ID"

            # Store as Repository Variables so the logger workflow can read them.
            REPO="${{ github.repository }}"
            NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)

            gh api "repos/${REPO}/actions/variables/DIARY_MEMO_ID_TODAY" \
              --method PATCH -f value="$MEMO_ID" 2>/dev/null \
            || gh api "repos/${REPO}/actions/variables" \
              --method POST -f name="DIARY_MEMO_ID_TODAY" -f value="$MEMO_ID"

            gh api "repos/${REPO}/actions/variables/DIARY_MEMO_LAST_UPDATED" \
              --method PATCH -f value="$NOW" 2>/dev/null \
            || gh api "repos/${REPO}/actions/variables" \
              --method POST -f name="DIARY_MEMO_LAST_UPDATED" -f value="$NOW"

            # Reset pending count at the start of each day.
            gh api "repos/${REPO}/actions/variables/PENDING_UPDATE_COUNT" \
              --method PATCH -f value="0" 2>/dev/null \
            || gh api "repos/${REPO}/actions/variables" \
              --method POST -f name="PENDING_UPDATE_COUNT" -f value="0"

            echo "✅ Stored DIARY_MEMO_ID_TODAY=$MEMO_ID"
          fi
