name: Flomo Time Logger Trigger

# Runs every 15 min during Beijing hours (08:00–23:59 CST = UTC 00:00–15:59).
# China has no DST, so this mapping is stable year-round.
on:
  schedule:
    - cron: '*/15 0-15 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: flomo-state-write
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Trigger Claude Routine
        run: |
          REPO="${{ github.repository }}"

          # Skip if still inside a rate limit window.
          RATE_UNTIL="${{ vars.RATE_LIMITED_UNTIL }}"
          if [ -n "$RATE_UNTIL" ] && [ "$(date -u +%s)" -lt "$(date -d "$RATE_UNTIL" +%s 2>/dev/null || echo 0)" ]; then
            echo "Rate limited until $RATE_UNTIL — skipping"
            exit 0
          fi

          # Use last successful call time as the lookback window. On cold-start
          # (variable empty) fall back to 24 hours ago to catch any missed entries.
          SINCE="${{ vars.LAST_ROUTINE_SUCCESS_AT }}"
          SINCE="${SINCE:-$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ)}"

          DIARY_MEMO_ID="${{ vars.DIARY_MEMO_ID_TODAY }}"

          if [ -n "$DIARY_MEMO_ID" ]; then
            BODY="{\"trigger\": \"flomo_time_record\", \"since\": \"${SINCE}\", \"diary_memo_id\": \"${DIARY_MEMO_ID}\"}"
          else
            BODY="{\"trigger\": \"flomo_time_record\", \"since\": \"${SINCE}\"}"
          fi

          HTTP_STATUS=$(curl -s -o /tmp/routine_response.txt -w "%{http_code}" \
            -X POST "${{ secrets.CLAUDE_ROUTINE_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.CLAUDE_ROUTINE_API_KEY }}" \
            -H "anthropic-version: 2023-06-01" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            --max-time 30)

          echo "HTTP status: $HTTP_STATUS"
          cat /tmp/routine_response.txt

          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            gh api "repos/${REPO}/actions/variables/LAST_ROUTINE_SUCCESS_AT" \
              --method PATCH -f value="$NOW" 2>/dev/null \
            || gh api "repos/${REPO}/actions/variables" \
              --method POST -f name="LAST_ROUTINE_SUCCESS_AT" -f value="$NOW"

            gh api "repos/${REPO}/actions/variables/RATE_LIMITED_UNTIL" \
              --method DELETE 2>/dev/null || true

            echo "✅ Routine called successfully at $NOW"

          elif [ "$HTTP_STATUS" = "429" ] || grep -qi "rate.limit\|try again\|quota exceeded" /tmp/routine_response.txt; then
            RETRY_AT=$(date -u -d '5 hours' +%Y-%m-%dT%H:%M:%SZ)
            gh api "repos/${REPO}/actions/variables/RATE_LIMITED_UNTIL" \
              --method PATCH -f value="$RETRY_AT" 2>/dev/null \
            || gh api "repos/${REPO}/actions/variables" \
              --method POST -f name="RATE_LIMITED_UNTIL" -f value="$RETRY_AT"
            echo "::warning::Rate limited. Skipping until $RETRY_AT"

          else
            echo "::warning::Routine webhook returned $HTTP_STATUS — will retry next run"
          fi
