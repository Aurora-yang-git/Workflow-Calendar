name: Flomo Time Logger Trigger

# Polls the flomo diary memo every 15 min during Beijing hours (08:00–23:59 CST).
# Detects changes via updated_at and increments PENDING_UPDATE_COUNT.
# Does NOT call the Routine — that happens in flomo-morning-call.yml / flomo-evening-call.yml.
on:
  schedule:
    - cron: '*/15 0-15 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: flomo-state-write
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Poll diary memo for changes
        run: |
          DIARY_MEMO_ID="${{ vars.DIARY_MEMO_ID_TODAY }}"
          if [ -z "$DIARY_MEMO_ID" ]; then
            echo "No diary memo ID yet (diary trigger hasn't run today) — skipping"
            exit 0
          fi

          REPO="${{ github.repository }}"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "https://flomoapp.com/api/v1/memo/${DIARY_MEMO_ID}" \
            -H "Authorization: Bearer ${{ secrets.FLOMO_API_TOKEN }}" \
            --max-time 15)

          HTTP_STATUS=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::warning::flomo GET /memo/${DIARY_MEMO_ID} returned $HTTP_STATUS — skipping this tick"
            exit 0
          fi

          MEMO_UPDATED=$(echo "$BODY" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('updated_at',''))" \
            2>/dev/null || echo "")

          if [ -z "$MEMO_UPDATED" ]; then
            echo "Could not parse updated_at from response — skipping"
            exit 0
          fi

          LAST_SEEN="${{ vars.DIARY_MEMO_LAST_UPDATED }}"

          if [ -n "$LAST_SEEN" ] && [ "$MEMO_UPDATED" \<= "$LAST_SEEN" ]; then
            echo "No change detected (updated_at=$MEMO_UPDATED) — skipping"
            exit 0
          fi

          COUNT="${{ vars.PENDING_UPDATE_COUNT }}"
          COUNT=$(( ${COUNT:-0} + 1 ))

          gh api "repos/${REPO}/actions/variables/PENDING_UPDATE_COUNT" \
            --method PATCH -f value="$COUNT" 2>/dev/null \
          || gh api "repos/${REPO}/actions/variables" \
            --method POST -f name="PENDING_UPDATE_COUNT" -f value="$COUNT"

          gh api "repos/${REPO}/actions/variables/DIARY_MEMO_LAST_UPDATED" \
            --method PATCH -f value="$MEMO_UPDATED" 2>/dev/null \
          || gh api "repos/${REPO}/actions/variables" \
            --method POST -f name="DIARY_MEMO_LAST_UPDATED" -f value="$MEMO_UPDATED"

          echo "✅ Diary memo updated ($MEMO_UPDATED) — PENDING_UPDATE_COUNT=$COUNT"
